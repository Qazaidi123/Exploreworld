apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend-depl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: IMAGE_PLACEHOLDER
        env:
        - name: DB_HOST
          valueFrom:
             configMapKeyRef:
               name: expo-config
               key: DB_HOST
        - name: DB_USER
          valueFrom:
             configMapKeyRef:
               name: expo-config
               key: DB_USER
        - name: DB_PASS
          valueFrom:
             configMapKeyRef:
               name: expo-config
               key: DB_PASS
        - name: DB_NAME
          valueFrom:
             configMapKeyRef:
               name: expo-config
               key: DB_NAME
        ports:
        - containerPort: 80
