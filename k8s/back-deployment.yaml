apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: bachend-depl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: IMAGE_PLACEHOLDER
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_USER
          value: "explore"
        - name: DB_PASS
          value: "explore123"
        - name: DB_NAME
          value: "exploreworld"
        ports:
        - containerPort: 80
