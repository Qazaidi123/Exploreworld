apiVersion: apps/v1
kind: Deployment

metadata:
  name: database-deployment
  labels:
    app: database-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: database

  template:
    metadata:
      labels:
        app: database

    spec:
      containers:
      - name: database-container
        image: mysql:5.7

        env:
        - name: DB_PASS
          valueFrom:
             configMapKeyRef:
               name: expo-config

        - name: DB_NAME
          valueFrom:
             configMapKeyRef:
               name: expo-config

        - name: DB_HOST
          valueFrom:
             configMapKeyRef:
               name: expo-config

        - name: DB_user
          valueFrom:
             configMapKeyRef:
               name: expo-config

        

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-initdb
        configMap:
          name: mysql-initdb-config
