apiVersion: apps/v1
kind: Deployment

metadata:
  name: database-deployment
  labels:
    app: database-depl

spec:
  replicas: 1

  selector:
    matchLabels:
      app: database

  template:
    metadata:
      labels:
        app: database

    spec:
      containers:
      - name: database-container
        image: mysql:5.7

        env:
        - name: MYSQL_DB_PASS
          value: explore123

        - name: MYSQL_DB_NAME
          value: exploreworld

        - name: MYSQL_DB_HOST
          value: mysql-service

        - name: MYSQL_DB_user
          value: explore

        

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-initdb
        configMap:
          name: mysql-initdb-config
