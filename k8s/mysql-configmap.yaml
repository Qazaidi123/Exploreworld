apiVersion: v1
kind: ConfigMap
metadata:
  name: expo-config
data:
  DB_HOST : mysql-service
  DB_NAME : exploreworld
  DB_USER : explore
  DB_PASS : explore123

  db.sql: |
    CREATE DATABASE exploreworld;
    USE exploreworld;

    CREATE TABLE registrations (
        id INT AUTO_INCREMENT PRIMARY KEY,
        reg_id VARCHAR(20),
        name VARCHAR(100),
        mobile VARCHAR(20),
        destination VARCHAR(100),
        members INT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
